<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Ducks Unlimited</title>
  <meta name="description" content="Stories from our Greenhills workshop — materials, craft, style." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .journal-header {
      text-align: center;
      padding: var(--space-2xl) var(--space-md) var(--space-lg);
      background: var(--color-white);
    }

    .journal-header h1 {
      font-family: var(--font-heading);
      font-size: var(--type-display);
      font-weight: 400;
      color: var(--color-primary);
      letter-spacing: var(--ls-tight);
      line-height: 1.05;
      margin: 0.25rem 0 0.75rem;
    }

    .journal-header__sub {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .journal-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-xl);
      padding: var(--space-lg) 0 var(--space-2xl);
    }

    .journal-card {
      text-decoration: none;
      color: inherit;
    }

    .journal-card:hover { text-decoration: none; }
    .journal-card:hover .journal-card__media img { transform: scale(1.04); }

    .journal-card__media {
      aspect-ratio: 3 / 2;
      background: var(--color-bg-warm);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .journal-card__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .journal-card__date {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 0.5rem;
    }

    .journal-card__title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--color-primary);
      line-height: 1.2;
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }

    .journal-card__excerpt {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 0.6rem;
    }

    .journal-card__author {
      font-size: 0.78rem;
      color: var(--color-text-light);
      letter-spacing: 0.06em;
    }

    .journal-empty {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--color-text-muted);
      grid-column: 1 / -1;
    }

    .journal-empty h2 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }

    @media (min-width: 768px) {
      .journal-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-xl);
      }
    }

    @media (min-width: 1024px) {
      .journal-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <div data-component="nav"></div>

  <main>

    <header class="journal-header">
      <p class="eyebrow">The Journal</p>
      <h1>Stories from the Workshop</h1>
      <span class="editorial-rule"></span>
      <p class="journal-header__sub">
        Notes on materials, craft, and style from three decades of making
        clothes in Greenhills.
      </p>
    </header>

    <div class="container">
      <div class="journal-grid" id="journalGrid"></div>
    </div>

  </main>

  <div data-component="footer"></div>

  <script type="module" src="/js/components.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/wishlist.js"></script>

  <script type="module">
    import { supabase } from '/lib/supabase.js';

    const grid = document.getElementById('journalGrid');

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function renderEmpty() {
      grid.innerHTML = `
        <div class="journal-empty">
          <h2>Stories coming soon</h2>
          <p>We're writing our first journal entries. Check back shortly.</p>
        </div>
      `;
    }

    async function load() {
      const { data, error } = await supabase
        .from('journal_posts')
        .select('id, slug, title, excerpt, hero_image, author, published_at')
        .not('published_at', 'is', null)
        .order('published_at', { ascending: false });

      if (error) { console.error(error); renderEmpty(); return; }
      if (!data || data.length === 0) { renderEmpty(); return; }

      grid.innerHTML = data.map(p => `
        <a class="journal-card" href="/journal/post.html?slug=${encodeURIComponent(p.slug)}">
          <div class="journal-card__media">
            ${p.hero_image ? `<img src="${escapeHtml(p.hero_image)}" alt="${escapeHtml(p.title)}" loading="lazy" />` : ''}
          </div>
          <p class="journal-card__date">${escapeHtml(formatDate(p.published_at))}</p>
          <h2 class="journal-card__title">${escapeHtml(p.title)}</h2>
          ${p.excerpt ? `<p class="journal-card__excerpt">${escapeHtml(p.excerpt)}</p>` : ''}
          ${p.author ? `<p class="journal-card__author">— ${escapeHtml(p.author)}</p>` : ''}
        </a>
      `).join('');
    }

    load();
  </script>

</body>
</html>
