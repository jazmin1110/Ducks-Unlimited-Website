<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Ducks Unlimited</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://qrtfgqscpaghtxnhtoyp.supabase.co" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .post-hero {
      position: relative;
      height: 60vh;
      min-height: 400px;
      overflow: hidden;
      background: var(--color-primary);
    }

    .post-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--space-2xl) var(--space-md);
      color: var(--color-white);
      text-align: center;
    }

    .post-hero__eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 0.75rem;
    }

    .post-hero__title {
      font-family: var(--font-heading);
      font-size: var(--type-display-sm);
      font-weight: 400;
      letter-spacing: var(--ls-tight);
      line-height: 1.1;
      max-width: 800px;
      margin: 0 auto 0.75rem;
    }

    .post-hero__meta {
      font-size: 0.85rem;
      opacity: 0.85;
      letter-spacing: 0.06em;
    }

    /* Body */
    .post-body {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--space-md);
      font-family: var(--font-body);
      font-size: 1.08rem;
      line-height: 1.85;
      color: var(--color-text);
    }

    .post-body h1, .post-body h2, .post-body h3 {
      font-family: var(--font-heading);
      color: var(--color-primary);
      margin: var(--space-xl) 0 var(--space-sm);
      line-height: 1.2;
    }

    .post-body h2 { font-size: 1.85rem; }
    .post-body h3 { font-size: 1.4rem; }

    .post-body p { margin-bottom: var(--space); }

    .post-body img {
      width: 100%;
      height: auto;
      margin: var(--space-lg) 0;
    }

    .post-body blockquote {
      border-left: 2px solid var(--color-accent);
      padding-left: var(--space-md);
      margin: var(--space-lg) 0;
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-style: italic;
      line-height: 1.4;
      color: var(--color-primary);
    }

    .post-body a {
      color: var(--color-primary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .post-body ul, .post-body ol {
      margin: 0 0 var(--space) 1.25rem;
    }

    .post-body li { margin-bottom: 0.4rem; }

    .post-foot {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-md) var(--space-2xl);
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space);
    }

    .post-foot a {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: none;
    }
    .post-foot a:hover { color: var(--color-primary); }

    .post-error {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
    }

    .post-error h2 {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <div data-component="nav"></div>

  <main id="postRoot">
    <div class="post-error" id="loadingState"><p style="color:#777;">Loading…</p></div>
  </main>

  <div data-component="footer"></div>

  <script type="module" src="/js/components.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/wishlist.js"></script>

  <script type="module">
    import { supabase } from '/lib/supabase.js';

    const root = document.getElementById('postRoot');

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function showError(title, msg) {
      root.innerHTML = `
        <div class="post-error">
          <h2>${escapeHtml(title)}</h2>
          <p style="color:#777;">${escapeHtml(msg)}</p>
          <p><a href="/journal/" class="btn btn-outline-dark" style="margin-top:1rem;">Back to Journal</a></p>
        </div>
      `;
    }

    async function init() {
      const slug = new URLSearchParams(window.location.search).get('slug');
      if (!slug) { showError('No post selected', 'Browse the journal index instead.'); return; }

      const { data, error } = await supabase
        .from('journal_posts')
        .select('id, slug, title, excerpt, hero_image, author, body_html, published_at')
        .eq('slug', slug)
        .single();

      if (error || !data || !data.published_at) {
        showError('Post not found', 'This story may not be published yet.');
        return;
      }

      document.title = `${data.title} — Ducks Unlimited Journal`;

      // body_html is rendered as-is. Admins should only paste trusted HTML.
      root.innerHTML = `
        ${data.hero_image ? `
          <section class="post-hero">
            <img src="${escapeHtml(data.hero_image)}" alt="${escapeHtml(data.title)}" />
            <div class="post-hero__overlay">
              <p class="post-hero__eyebrow">The Journal</p>
              <h1 class="post-hero__title">${escapeHtml(data.title)}</h1>
              <p class="post-hero__meta">
                ${data.author ? escapeHtml(data.author) + ' · ' : ''}${escapeHtml(formatDate(data.published_at))}
              </p>
            </div>
          </section>
        ` : `
          <section class="post-error">
            <p class="eyebrow">The Journal</p>
            <h1 style="font-family: var(--font-heading); font-size: 2.5rem; color: var(--color-primary); margin: 0.5rem 0;">
              ${escapeHtml(data.title)}
            </h1>
            <p style="color:#777;">
              ${data.author ? escapeHtml(data.author) + ' · ' : ''}${escapeHtml(formatDate(data.published_at))}
            </p>
          </section>
        `}

        <article class="post-body">${data.body_html}</article>

        <footer class="post-foot">
          <a href="/journal/">← Back to Journal</a>
          <a href="/shop.html">Shop the Collection →</a>
        </footer>
      `;
    }

    init();
  </script>

</body>
</html>
