<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find a Store — Ducks Unlimited</title>
  <meta name="description" content="Visit Ducks Unlimited in Greenhills. See the workshop, meet the team, and shop the full collection in person." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .stores-header {
      text-align: center;
      padding: var(--space-2xl) var(--space-md) var(--space-lg);
      background: var(--color-white);
    }

    .stores-header h1 {
      font-family: var(--font-heading);
      font-size: var(--type-display);
      font-weight: 400;
      color: var(--color-primary);
      letter-spacing: var(--ls-tight);
      line-height: 1.05;
      margin: 0.25rem 0 0.75rem;
    }

    .stores-header__sub {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .stores-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-xl);
      padding: var(--space-lg) 0 var(--space-2xl);
    }

    .store-card {
      background: var(--color-white);
      border: 1px solid var(--color-border-light);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
    }

    .store-card__map {
      aspect-ratio: 16 / 10;
      background: var(--color-bg-warm);
    }

    .store-card__map iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .store-card__body {
      padding: var(--space-lg);
    }

    .store-card__label {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 0.5rem;
    }

    .store-card h2 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 400;
      color: var(--color-primary);
      letter-spacing: var(--ls-tight);
      margin-bottom: var(--space-sm);
    }

    .store-card__desc {
      color: var(--color-text);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: var(--space-md);
    }

    .store-card__meta {
      display: grid;
      gap: var(--space-md);
      grid-template-columns: 1fr;
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border-light);
    }

    .store-card__block-label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 0.4rem;
    }

    .store-card__address {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--color-text);
    }

    .store-card__address a {
      display: inline-block;
      margin-top: 0.4rem;
      color: var(--color-primary);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .store-card__hours table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .store-card__hours td {
      padding: 0.25rem 0;
      color: var(--color-text);
    }

    .store-card__hours td:first-child {
      color: var(--color-text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      width: 90px;
    }

    .stores-empty {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--color-text-muted);
    }

    @media (min-width: 768px) {
      .store-card { grid-template-columns: 1fr 1fr; }
      .store-card__map { aspect-ratio: auto; min-height: 360px; }
      .store-card__meta { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div data-component="nav"></div>

  <main>
    <header class="stores-header">
      <p class="eyebrow">Visit Us</p>
      <h1>Find a Store</h1>
      <span class="editorial-rule"></span>
      <p class="stores-header__sub">
        Come by the workshop. See the cloth woven, meet the team, and try
        on the full collection.
      </p>
    </header>

    <div class="container">
      <div class="stores-grid" id="storesGrid">
        <p class="stores-empty">Loading…</p>
      </div>
    </div>
  </main>

  <div data-component="footer"></div>

  <script type="module" src="/js/components.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/wishlist.js"></script>

  <script type="module">
    import { supabase } from '/lib/supabase.js';

    const DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function mapEmbedUrl(store) {
      // Prefer lat/lng for a precise pin; fall back to a name+city search
      if (store.lat && store.lng) {
        return `https://www.google.com/maps?q=${store.lat},${store.lng}&hl=en&z=16&output=embed`;
      }
      const q = encodeURIComponent(`${store.name}, ${store.address}, ${store.city}`);
      return `https://www.google.com/maps?q=${q}&output=embed`;
    }

    function directionsUrl(store) {
      const dest = store.lat && store.lng
        ? `${store.lat},${store.lng}`
        : encodeURIComponent(`${store.name}, ${store.address}, ${store.city}`);
      return `https://www.google.com/maps/dir/?api=1&destination=${dest}`;
    }

    function renderHours(hours) {
      if (!hours || typeof hours !== 'object') return '';
      return `
        <table>
          ${DAY_ORDER.map(d => `
            <tr>
              <td>${d}</td>
              <td>${escapeHtml(hours[d] ?? 'Closed')}</td>
            </tr>
          `).join('')}
        </table>
      `;
    }

    async function load() {
      const { data, error } = await supabase
        .from('stores')
        .select('*')
        .eq('is_active', true)
        .order('display_order')
        .order('name');

      const grid = document.getElementById('storesGrid');
      if (error) {
        console.error(error);
        grid.innerHTML = '<p class="stores-empty">Could not load stores.</p>';
        return;
      }
      if (!data || data.length === 0) {
        grid.innerHTML = '<p class="stores-empty">Store information coming soon.</p>';
        return;
      }

      grid.innerHTML = data.map(s => `
        <article class="store-card">
          <div class="store-card__map">
            <iframe
              src="${escapeHtml(mapEmbedUrl(s))}"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Map of ${escapeHtml(s.name)}"></iframe>
          </div>
          <div class="store-card__body">
            <p class="store-card__label">${escapeHtml(s.city)}${s.province ? ', ' + escapeHtml(s.province) : ''}</p>
            <h2>${escapeHtml(s.name)}</h2>
            ${s.description ? `<p class="store-card__desc">${escapeHtml(s.description)}</p>` : ''}

            <div class="store-card__meta">
              <div>
                <p class="store-card__block-label">Address</p>
                <p class="store-card__address">
                  ${escapeHtml(s.address)}<br />
                  ${escapeHtml(s.city)}${s.province ? ', ' + escapeHtml(s.province) : ''}${s.postal_code ? ' ' + escapeHtml(s.postal_code) : ''}
                  ${s.phone ? `<br />${escapeHtml(s.phone)}` : ''}
                  ${s.email ? `<br /><a href="mailto:${escapeHtml(s.email)}">${escapeHtml(s.email)}</a>` : ''}
                  <a href="${escapeHtml(directionsUrl(s))}" target="_blank" rel="noopener">Get directions →</a>
                </p>
              </div>
              <div>
                <p class="store-card__block-label">Hours</p>
                <div class="store-card__hours">${renderHours(s.hours)}</div>
              </div>
            </div>
          </div>
        </article>
      `).join('');
    }

    load();
  </script>
</body>
</html>
