<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Ducks Unlimited</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div data-component="nav"></div>

  <main class="auth-shell">
    <div class="auth-card">

      <p class="eyebrow">Join the Family</p>
      <h1>Create Account</h1>
      <p class="auth-card__sub">
        Save your favorites, track orders, and check out faster next time.
      </p>

      <div class="auth-success" id="formSuccess" hidden>
        Check your inbox. We sent a confirmation link to verify your email.
      </div>

      <form class="auth-form" id="signUpForm" novalidate>

        <div class="auth-error" id="formError" hidden></div>

        <div class="field">
          <label class="field-label" for="displayName">Name</label>
          <input class="input" type="text" id="displayName" name="displayName"
                 autocomplete="name" required />
        </div>

        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input class="input" type="email" id="email" name="email"
                 autocomplete="email" required />
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="input" type="password" id="password" name="password"
                 autocomplete="new-password" required minlength="6" />
          <span class="field-hint">At least 6 characters.</span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="auth-card__alt">
        Already have an account? <a href="/auth/sign-in.html" id="signInLink">Sign in</a>
      </div>

    </div>
  </main>

  <div data-component="footer"></div>

  <script type="module" src="/js/components.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/wishlist.js"></script>

  <script type="module">
    import { signUp, getCurrentUser } from '/js/auth.js';

    const params = new URLSearchParams(window.location.search);
    const nextUrl = params.get('next') || '/account/';

    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = nextUrl;
    })();

    // Preserve `?next=` on the sign-in link
    if (params.get('next')) {
      document.getElementById('signInLink').href =
        `/auth/sign-in.html?next=${encodeURIComponent(params.get('next'))}`;
    }

    const form       = document.getElementById('signUpForm');
    const errorBox   = document.getElementById('formError');
    const successBox = document.getElementById('formSuccess');
    const submitBtn  = document.getElementById('submitBtn');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.hidden = true;

      const displayName = form.displayName.value.trim();
      const email       = form.email.value.trim();
      const password    = form.password.value;

      if (!displayName || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      const { user, error } = await signUp({ email, password, displayName });

      if (error) {
        showError(error.message || 'Sign up failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
        return;
      }

      // If email confirmation is on, user will need to verify before signing in.
      // If it's off, they're already signed in — bounce to next.
      if (user && user.confirmed_at) {
        window.location.href = nextUrl;
      } else {
        form.hidden = true;
        successBox.hidden = false;
      }
    });
  </script>

</body>
</html>
